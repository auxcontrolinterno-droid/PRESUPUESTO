<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presupuesto Mensual</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    margin:0;
    padding:0;
}

.container{
    max-width:600px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

input,select,button{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#111827;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

#mensaje{
    text-align:center;
    font-weight:bold;
    margin-top:10px;
    color:green;
}
</style>
</head>

<body>

<div class="container">
    <h1>Presupuesto Mensual</h1>
    <p>Registra ingresos y gastos en Google Sheets</p>

    <form id="formulario">

        <input type="date" id="fecha" required>

        <select id="categoria" required>
            <option value="">Selecciona categoría</option>
            <option value="Ingreso">Ingreso</option>
            <option value="Vivienda">Vivienda</option>
            <option value="Comida">Comida</option>
            <option value="Transporte">Transporte</option>
            <option value="Servicios">Servicios</option>
            <option value="Entretenimiento">Entretenimiento</option>
            <option value="Ahorro">Ahorro</option>
        </select>

        <input type="text" id="descripcion" placeholder="Descripción" required>

        <input type="number" id="monto" placeholder="Monto" required>

        <button type="submit">Guardar Registro</button>

    </form>

    <div id="mensaje"></div>
</div>

<script>
const URL_SCRIPT = "https://script.google.com/a/macros/altamira.edu.co/s/AKfycbwRH7UdQgrh7lW_0zFzg6VDU7aZjDRdwqSImhV7juUGMnAjk9WxUF-otSdRW3iX07IK/exec";

document.getElementById("formulario").addEventListener("submit", async function(e){
    e.preventDefault();

    const fecha = document.getElementById("fecha").value;
    const categoria = document.getElementById("categoria").value;
    const descripcion = document.getElementById("descripcion").value;
    const monto = document.getElementById("monto").value;

    const tipo = categoria === "Ingreso" ? "Ingreso" : "Gasto";

    const fechaObj = new Date(fecha);
    const mes = fechaObj.getMonth() + 1;
    const año = fechaObj.getFullYear();

    const datos = {
        Fecha: fecha,
        Categoría: categoria,
        Descripción: descripcion,
        Monto: monto,
        Tipo: tipo,
        Mes: mes,
        Año: año
    };

    document.getElementById("mensaje").innerHTML = "Guardando...";

    try{
        const respuesta = await fetch(URL_SCRIPT,{
            method:"POST",
            body: JSON.stringify(datos)
        });

        const resultado = await respuesta.json();

        document.getElementById("mensaje").innerHTML = "Registro guardado correctamente";

        document.getElementById("formulario").reset();

    }catch(error){
        document.getElementById("mensaje").innerHTML = "Error al guardar";
    }
});
</script>

</body>
</html>
