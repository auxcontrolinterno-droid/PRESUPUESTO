<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financiero con Historial</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:18px;
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:32px;
}

.header p{
    color:#cbd5e1;
    margin-top:8px;
}

.filtro{
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:18px;
    margin-bottom:20px;
}

select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
    outline:none;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    margin-bottom:25px;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:18px;
}

.card h3{
    font-size:14px;
    color:#94a3b8;
}

.card p{
    font-size:28px;
    font-weight:700;
    margin-top:8px;
}

.section{
    background:white;
    color:#111827;
    border-radius:20px;
    padding:20px;
    margin-bottom:25px;
    overflow:hidden;
}

canvas{
    width:100%!important;
    max-height:350px;
}

.table-wrap{
    overflow-x:auto;
}

table{
    width:100%;
    min-width:600px;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #e5e7eb;
    font-size:14px;
    text-align:left;
}

th{
    background:#f8fafc;
}

td:last-child,
th:last-child{
    text-align:right;
}

@media(max-width:768px){

.header h1{
    font-size:26px;
}

.cards{
    grid-template-columns:1fr;
}

.card p{
    font-size:24px;
}

th,td{
    font-size:13px;
    padding:10px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>📊 Dashboard Financiero</h1>
<p>Con historial mensual</p>
</div>

<div class="filtro">
<select id="selectorMes"></select>
</div>

<div class="cards">

<div class="card">
<h3>Ingresos</h3>
<p id="ingresos">$0</p>
</div>

<div class="card">
<h3>Gastos</h3>
<p id="gastos">$0</p>
</div>

<div class="card">
<h3>Balance</h3>
<p id="balance">$0</p>
</div>

<div class="card">
<h3>Movimientos</h3>
<p id="movimientos">0</p>
</div>

</div>

<div class="section">
<canvas id="graficaMes"></canvas>
</div>

<div class="section">
<h2 style="margin-bottom:15px;">Historial General</h2>
<canvas id="graficaHistorial"></canvas>
</div>

<div class="section">
<h2 style="margin-bottom:15px;">Últimos Movimientos</h2>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Fecha</th>
<th>Categoría</th>
<th>Descripción</th>
<th>Monto</th>
</tr>
</thead>

<tbody id="tabla">
<tr>
<td colspan="4">Cargando...</td>
</tr>
</tbody>
</table>
</div>

</div>

</div>

<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwRH7UdQgrh7lW_0zFzg6VDU7aZjDRdwqSImhV7juUGMnAjk9WxUF-otSdRW3iX07IK/exec";

let datosGlobal = [];
let chartMes = null;
let chartHistorial = null;

function obtenerMes(fecha){
let d = new Date(fecha);
return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
}

function nombreMes(valor){
const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
let partes = valor.split("-");
return meses[Number(partes[1])-1] + " " + partes[0];
}

async function cargarDatos(){

const res = await fetch(URL_SCRIPT);
datosGlobal = await res.json();

crearSelector();
crearHistorial();
actualizarMes();

}

function crearSelector(){

let meses = [...new Set(datosGlobal.map(x => obtenerMes(x.Fecha)))].reverse();

let html = "";

meses.forEach(m=>{
html += `<option value="${m}">${nombreMes(m)}</option>`;
});

document.getElementById("selectorMes").innerHTML = html;

document.getElementById("selectorMes").addEventListener("change",actualizarMes);

}

function actualizarMes(){

let mes = document.getElementById("selectorMes").value;

let datos = datosGlobal.filter(x => obtenerMes(x.Fecha) === mes);

let ingresos = 0;
let gastos = 0;

datos.forEach(item=>{
let monto = Number(item.Monto);

if(item.Tipo === "Ingreso"){
ingresos += monto;
}else{
gastos += monto;
}
});

let balance = ingresos - gastos;

document.getElementById("ingresos").innerHTML = "$" + ingresos.toLocaleString();
document.getElementById("gastos").innerHTML = "$" + gastos.toLocaleString();
document.getElementById("balance").innerHTML = "$" + balance.toLocaleString();
document.getElementById("movimientos").innerHTML = datos.length;

let tabla = "";

datos.slice().reverse().forEach(item=>{

tabla += `
<tr>
<td>${item.Fecha}</td>
<td>${item.Categoría}</td>
<td>${item.Descripción}</td>
<td>$${Number(item.Monto).toLocaleString()}</td>
</tr>
`;

});

document.getElementById("tabla").innerHTML = tabla || "<tr><td colspan='4'>Sin movimientos</td></tr>";

if(chartMes) chartMes.destroy();

chartMes = new Chart(document.getElementById("graficaMes"),{
type:"doughnut",
data:{
labels:["Ingresos","Gastos"],
datasets:[{
data:[ingresos,gastos]
}]
},
options:{
responsive:true
}
});

}

function crearHistorial(){

let resumen = {};

datosGlobal.forEach(item=>{

let mes = obtenerMes(item.Fecha);

if(!resumen[mes]){
resumen[mes] = {ingresos:0,gastos:0};
}

if(item.Tipo === "Ingreso"){
resumen[mes].ingresos += Number(item.Monto);
}else{
resumen[mes].gastos += Number(item.Monto);
}

});

let labels = Object.keys(resumen).sort();
let balances = labels.map(m => resumen[m].ingresos - resumen[m].gastos);

if(chartHistorial) chartHistorial.destroy();

chartHistorial = new Chart(document.getElementById("graficaHistorial"),{
type:"bar",
data:{
labels:labels.map(nombreMes),
datasets:[{
label:"Balance",
data:balances
}]
},
options:{
responsive:true
}
});

}

cargarDatos();
</script>

</body>
</html>
